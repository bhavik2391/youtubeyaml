# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

pool:
  vmImage: ubuntu-latest

# trigger:
#   - main  # or your branch name

# pool:
#   name: MySelfHostedPool # ✅ Your self-hosted agent name

steps:
  # Step 1: Install dependencies
  - task: Npm@1
    displayName: 'Install Dependencies'
    inputs:
      command: 'install'

  # Step 2: Run build
  - task: Npm@1
    displayName: 'npm build'
    inputs:
      command: 'custom'
      customCommand: 'run build'

  # Step 3: Publish build artifacts
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact: drop'
    inputs:
      PathtoPublish: 'build'
      ArtifactName: 'drop'
      publishLocation: 'Container'

  # Step 4: Deploy to Azure Web App on Linux
  - task: AzureWebApp@1
    displayName: 'Deploy to Azure Web App'
    inputs:
      azureSubscription: 'azure-connection'  # Replace with your Azure DevOps service connection
      appType: 'webAppLinux'
      appName: 'bhavikapp'                   # Replace with your Azure Web App name
      package: '$(System.DefaultWorkingDirectory)/build'
      runtimeStack: 'STATICSITE|1.0'